name: CI

on:
  push:
    branches: [master, main, dev]
  pull_request:
    branches: [master, main, dev]

jobs:
  smoke-tests:
    name: Headless Smoke Tests
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Download Godot 4.6.2 headless
        run: |
          wget -q https://github.com/godotengine/godot/releases/download/4.6.2-stable/Godot_v4.6.2-stable_linux.x86_64.zip
          unzip -q Godot_v4.6.2-stable_linux.x86_64.zip
          mv Godot_v4.6.2-stable_linux.x86_64 godot
          chmod +x godot

      - name: Run automated headless gate
        run: python3 tools/run_automated_tests.py --tier headless --godot ./godot
