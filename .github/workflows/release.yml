name: Release

on:
  push:
    tags:
      - "v*"

jobs:
  export:
    name: Export & Release
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Download Godot 4.6.2
        run: |
          wget -q https://github.com/godotengine/godot/releases/download/4.6.2-stable/Godot_v4.6.2-stable_linux.x86_64.zip
          unzip -q Godot_v4.6.2-stable_linux.x86_64.zip
          mv Godot_v4.6.2-stable_linux.x86_64 godot
          chmod +x godot

      - name: Download export templates
        run: |
          mkdir -p ~/.local/share/godot/export_templates/4.6.2.stable
          wget -q -O export_templates.tpz \
            https://github.com/godotengine/godot/releases/download/4.6.2-stable/Godot_v4.6.2-stable_export_templates.tpz
          unzip -q export_templates.tpz
          mv templates/* ~/.local/share/godot/export_templates/4.6.2.stable/

      - name: Export — Linux/X11
        run: |
          mkdir -p builds/linux
          ./godot --path . --headless --export-release "Linux/X11" "builds/linux/dream-coastline.x86_64"

      - name: Export — Windows Desktop
        run: |
          mkdir -p builds/windows
          ./godot --path . --headless --export-release "Windows Desktop" "builds/windows/Dream Coastline.exe"

      - name: Package artifacts
        run: |
          cd builds/linux  && zip -q dream-coastline-linux.zip dream-coastline.x86_64 && cd -
          cd builds/windows && zip -q "dream-coastline-windows.zip" "Dream Coastline.exe" && cd -

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            builds/linux/dream-coastline-linux.zip
            builds/windows/dream-coastline-windows.zip
          generate_release_notes: true
